spring.application.name=Vrnt
server.port=8081

# Default local run uses embedded H2 so the app starts without a MySQL server
# File-based so user data survives app restarts and dashboard lookups stay available.
spring.datasource.url=jdbc:h2:file:./data/vrntdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
