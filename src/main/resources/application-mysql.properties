# Spring Boot profile: mysql
# Activate with -Dspring.profiles.active=mysql or SPRING_PROFILES_ACTIVE=mysql

spring.datasource.url=jdbc:mysql://localhost:3306/vrnt_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# HikariCP tuning
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# File storage & application specific
app.upload.dir=uploads/
app.excel.path=./VRNT_Data/vrnt_users.xlsx

# Logging
logging.level.org.springframework=INFO
logging.level.com.example=DEBUG
