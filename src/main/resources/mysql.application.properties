# Custom MySQL properties file (user-requested)
# Note: Spring Boot does not automatically load this filename unless imported.
# Use the `mysql` profile (application-mysql.properties) or import this file from application.properties.

spring.datasource.url=jdbc:mysql://localhost:3306/vrnt_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000

# Application-specific
app.upload.dir=uploads/
app.excel.path=./VRNT_Data/vrnt_users.xlsx

# JWT (if JwtUtil is later made configurable)
# jwt.secret=vrnt_secret_key_2025_abcdefghijklmnopqrstuvwxyz
# jwt.expiry-ms=86400000
